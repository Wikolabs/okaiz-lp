name: Deploy okaiz-lp

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.WIKOLABS_VM_SSH_KEY }}
          VM_HOST: ${{ secrets.WIKOLABS_VM_HOST }}
          VM_USER: ${{ secrets.WIKOLABS_VM_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$VM_USER@$VM_HOST" bash << 'REMOTE
set -e
[ ! -d /opt/okaiz-lp/.git ] && git clone https://github.com/Wikolabs/okaiz-lp.git /opt/okaiz-lp
cd /opt/okaiz-lp
git pull origin main
docker build -t okaiz-lp:local .
docker stop okaiz-lp 2>/dev/null || true
docker rm okaiz-lp 2>/dev/null || true
docker run -d --name okaiz-lp -p 3052:3000 --restart unless-stopped okaiz-lp:local
echo Deployed okaiz-lp on port 3052
REMOTE