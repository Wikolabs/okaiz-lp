name: Deploy okaiz

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy to VM via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.WIKOLABS_VM_SSH_KEY }}
          VM_HOST: ${{ secrets.WIKOLABS_VM_HOST }}
          VM_USER: ${{ secrets.WIKOLABS_VM_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key             -o StrictHostKeyChecking=no             -o UserKnownHostsFile=/dev/null             -o ServerAliveInterval=30             -o ServerAliveCountMax=30             "$VM_USER@$VM_HOST"             "set -e; if [ -d /opt/okaiz/.git ]; then cd /opt/okaiz && git remote set-url origin https://github.com/Wikolabs/okaiz-lp.git && git fetch origin main && git reset --hard origin/main; else git clone https://github.com/Wikolabs/okaiz-lp.git /opt/okaiz && cd /opt/okaiz; fi && docker build -t okaiz:local . && (docker stop okaiz 2>/dev/null; docker rm okaiz 2>/dev/null; true) && docker run -d --name okaiz -p 3052:3000 --restart unless-stopped okaiz:local && echo 'Deployed okaiz on port 3052'"
